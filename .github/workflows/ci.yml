name: CI

on: [ push, pull_request ]  

jobs:

  # Ensure code is properly formatted with rustfmt
  format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: rustup toolchain install stable --no-self-update --profile minimal --component rustfmt
    - run: cargo fmt --all -- --check
  
  # Lint the library
  clippy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: rustup toolchain install stable --no-self-update --profile minimal --component clippy
    - run: cargo clippy --all-features -- -D warnings

  # Run all tests
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - run: rustup toolchain install stable --no-self-update --profile minimal
    - run: cargo test --all-features

  # Check that documentation builds without warnings.
  doc:
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
    - uses: actions/checkout@v6
    - run: rustup toolchain install nightly --no-self-update --profile minimal
    - run: cargo +nightly rustdoc --all-features -- --cfg=docsrs
